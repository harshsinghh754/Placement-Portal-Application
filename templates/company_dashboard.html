{% extends "base.html" %}
{% block title %}Company Dashboard{% endblock %}

{% block content %}
<h3 class="mb-4">Company Dashboard</h3>

<div class="row">
    <div class="col-md-6">
        <div class="card shadow mb-3">
            <div class="card-body">
                <h5>Create Placement Drive</h5>
                <p class="text-muted">Post a new job opportunity</p>
                <a href="/company/drives" class="btn btn-success">
                    Create Drive
                </a>

            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow mb-3">
            <div class="card-body">
                <h5>View Applications</h5>
                <p class="text-muted">Shortlist and manage applicants</p>
                <a href="/company/applications" class="btn btn-primary">
                    View Applications
                </a>

            </div>
        </div>
    </div>
</div>
{% endblock %}
