{% extends "base.html" %}
{% block title %}Company Drives{% endblock %}

{% block content %}
<h4>My Placement Drives</h4>

<div class="card mb-4 shadow">
    <div class="card-body">
        <h5>Create New Drive</h5>

        <form method="POST">
            <input class="form-control mb-2" name="title" placeholder="Job Title" required>
            <textarea class="form-control mb-2" name="description" placeholder="Job Description" required></textarea>
            <input class="form-control mb-2" type="date" name="deadline" required>

            <button class="btn btn-success">Create Drive</button>
        </form>
    </div>
</div>

<table class="table table-bordered">
    <tr>
        <th>Title</th>
        <th>Deadline</th>
        <th>Status</th>
    </tr>

    {% for d in drives %}
    <tr>
        <td>{{ d.title }}</td>
        <td>{{ d.deadline }}</td>
        <td>
            {% if d.approved %}
                <span class="badge bg-success">Approved</span>
            {% else %}
                <span class="badge bg-warning">Pending</span>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
