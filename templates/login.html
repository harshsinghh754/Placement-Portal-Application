<!DOCTYPE html>
<html>
<head>
    <title>Login | Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height:100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow">
                <div class="card-body">
                    <h4 class="text-center mb-3">Placement Portal Login</h4>

                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Login
                        </button>
                        <hr>
                        <div class="text-center">
                            <p class="mb-2">New here?</p>
                            <a href="/register/student" class="btn btn-outline-success w-100 mb-2">
                                Register as Student
                            </a>
                            <a href="/register/company" class="btn btn-outline-primary w-100">
                                Register as Company
                            </a>
                        </div>

                    </form>
                </div>
            </div>

            <p class="text-center text-muted mt-3">
                Institute Placement Management System
            </p>

        </div>
    </div>
</div>

</body>
</html>
